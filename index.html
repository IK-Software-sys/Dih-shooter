<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, landscape">
    <title>3D FPS - Survival Mode</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #87CEEB;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100vw; height: 100vh;
        }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 50;
        }

        /* Screen effects for speed/dash */
        #speed-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Radial blur effect simulation */
            backdrop-filter: blur(0px);
            /* Speed lines pattern */
            background: repeating-conic-gradient(
                from 0deg at 50% 50%,
                rgba(255, 255, 255, 0) 0deg,
                rgba(255, 255, 255, 0) 5deg,
                rgba(255, 255, 255, 0.15) 6deg,
                rgba(255, 255, 255, 0) 7deg
            );
            opacity: 0;
            transition: opacity 0.2s ease-out, backdrop-filter 0.2s ease-out;
            pointer-events: none;
            z-index: 5;
            mask-image: radial-gradient(circle, transparent 30%, black 100%);
            -webkit-mask-image: radial-gradient(circle, transparent 30%, black 100%);
        }

        /* HUD elements */
        #hud-top {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            font-family: Arial, sans-serif;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        #health-container {
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
        }
        #health-bar {
            width: 100%;
            height: 100%;
            background: limegreen;
            transition: width 0.2s, background 0.2s;
        }

        #stats { text-align: right; font-size: 18px; font-weight: bold; }
        
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0, 255, 0, 0.7);
            font-size: 24px;
            font-family: sans-serif;
            pointer-events: none;
        }

        #joystick-left {
            position: absolute;
            bottom: 40px; left: 50px;
            width: 120px; height: 120px;
            pointer-events: auto;
        }

        .action-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            transition: background 0.2s, opacity 0.2s;
        }
        .action-btn:active { background: rgba(255, 255, 255, 0.6); }

        #btn-jump { bottom: 40px; right: 50px; width: 70px; height: 70px; font-size: 14px; }
        #btn-dash { bottom: 125px; right: 50px; width: 60px; height: 60px; font-size: 12px; background: rgba(100, 200, 255, 0.3); }
        #btn-shoot { bottom: 200px; right: 50px; width: 65px; height: 65px; font-size: 12px; background: rgba(255, 100, 100, 0.3); border-color: rgba(255, 100, 100, 0.6); }
        #btn-shoot:active { background: rgba(255, 50, 50, 0.8); }
        
        #hit-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: red; opacity: 0; pointer-events: none; z-index: 20;
            transition: opacity 0.1s;
        }

    </style>
</head>
<body>

    <div id="loading">Loading Assets (0/4)...</div>
    <div id="speed-effect"></div>
    <div id="hit-flash"></div>
    
    <div id="ui-layer">
        <div id="hud-top">
            <div id="health-container"><div id="health-bar"></div></div>
            <div id="stats">
                <div id="wave-text">WAVE 1</div>
                <div id="ammo-text">AMMO: 10 / 30</div>
            </div>
        </div>
        <div id="crosshair">＋</div>
        <div id="joystick-left"></div>
        <button id="btn-shoot" class="action-btn">SHOOT</button>
        <button id="btn-dash" class="action-btn">DASH</button>
        <button id="btn-jump" class="action-btn">JUMP</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // --- 1. AUDIO SETUP ---
        const bgMusic = new Audio('music.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.25;

        function playShootSound() {
            const sound = new Audio('shot.mp3');
            sound.volume = 0.8;
            sound.play().catch(e => console.log(e));
        }

        const runSfx = new Audio('run.mp3');
        runSfx.loop = true; runSfx.volume = 0.5;

        let audioUnlocked = false;
        document.body.addEventListener('touchstart', () => {
            if (!audioUnlocked) {
                bgMusic.play().catch(e => console.log("Autoplay prevented", e));
                audioUnlocked = true;
            }
        }, { once: true });


        // --- 2. SCENE SETUP (NO FOG, HIGH VISIBILITY) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.rotation.order = 'YXZ';
        scene.add(camera); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // Brighter
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.6);
        sunLight.position.set(100, 200, 100);
        scene.add(sunLight);


        // --- 3. ASSET LOADING ---
        const loader = new THREE.GLTFLoader();
        let mapModel = null, gunModel = null, baseEnemyModel = null, baseAmmoModel = null;
        let modelsLoaded = 0;
        const totalModels = 4;

        function checkLoading() {
            modelsLoaded++;
            document.getElementById('loading').innerText = `Loading Assets (${modelsLoaded}/${totalModels})...`;
            if (modelsLoaded === totalModels) {
                document.getElementById('loading').style.display = 'none';
                startWave(); // Start game
            }
        }

        loader.load('map.glb', (gltf) => { mapModel = gltf.scene; scene.add(mapModel); checkLoading(); });
        loader.load('gun.glb', (gltf) => { 
            gunModel = gltf.scene; 
            gunModel.position.set(0.6, -0.4, -1.2); 
            camera.add(gunModel); 
            checkLoading(); 
        });
        loader.load('enemy.glb', (gltf) => { baseEnemyModel = gltf.scene; checkLoading(); });
        loader.load('ammo.glb', (gltf) => { baseAmmoModel = gltf.scene; checkLoading(); });


        // --- 4. GAME STATE & SYSTEMS ---
        // Player Stats
        let hp = 100;
        const maxHp = 100;
        let lastHitTime = 0;
        let isDead = false;

        // Ammo System
        let clipAmmo = 10;
        const maxClip = 10;
        let reserveAmmo = 30;
        let isReloading = false;

        // Wave System
        let currentWave = 1;
        let enemiesAlive = 0;
        let enemiesToSpawn = 0;
        const enemies = [];
        const ammoDrops = [];
        const enemiesGroup = new THREE.Group();
        scene.add(enemiesGroup);

        const hpBar = document.getElementById('health-bar');
        const ammoText = document.getElementById('ammo-text');
        const waveText = document.getElementById('wave-text');

        function updateHUD() {
            hpBar.style.width = Math.max(0, hp) + '%';
            hpBar.style.background = hp > 50 ? 'limegreen' : (hp > 25 ? 'orange' : 'red');
            if(isReloading) ammoText.innerText = "RELOADING...";
            else ammoText.innerText = `AMMO: ${clipAmmo} / ${reserveAmmo}`;
            waveText.innerText = `WAVE ${currentWave}`;
        }


        // --- 5. PLAYER PHYSICS & CONTROLS ---
        const playerHeight = 40; 
        const playerRadius = 8;  
        
        // MOVEMENT UPGRADED (Doubled speeds)
        const runSpeed = 9.0; 
        const dashMultiplier = 4.0; // Total dash speed = 36.0
        let currentSpeed = runSpeed;
        
        let yVelocity = 0;
        let isGrounded = false;
        let jumps = 0; 
        const gravity = 0.25; 
        const jumpStrength = 5.5; 

        let dashTimer = 0;
        let dashCooldown = 0;

        camera.position.set(0, playerHeight + 100, 0);

        // UI Controls
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isGrounded || jumps < 2) { yVelocity = jumpStrength; jumps++; isGrounded = false; }
        });

        document.getElementById('btn-dash').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (dashCooldown <= 0) {
                dashTimer = 0.4; // Doubled dash duration
                dashCooldown = 3.0; 
                document.getElementById('btn-dash').style.opacity = '0.5';
            }
        });

        const raycaster = new THREE.Raycaster();
        document.getElementById('btn-shoot').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isDead || isReloading) return;

            if (clipAmmo > 0) {
                clipAmmo--;
                playShootSound();
                updateHUD();
                
                // Visual Recoil
                if(gunModel) { gunModel.position.z += 0.2; setTimeout(() => gunModel.position.z -= 0.2, 100); }

                // Raycast Shooting
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const hits = raycaster.intersectObjects(enemiesGroup.children, true);
                
                if (hits.length > 0) {
                    // Find root enemy object
                    let hitObject = hits[0].object;
                    while (hitObject.parent && hitObject.parent !== enemiesGroup) {
                        hitObject = hitObject.parent;
                    }
                    
                    if (hitObject.userData.hp) {
                        hitObject.userData.hp -= 35; // Damage dealt
                        // Hit indicator (scale up slightly)
                        hitObject.scale.multiplyScalar(1.1);
                        setTimeout(() => hitObject.scale.multiplyScalar(0.909), 100);

                        if (hitObject.userData.hp <= 0) killEnemy(hitObject);
                    }
                }
            } else if (reserveAmmo > 0) {
                // Auto Reload
                isReloading = true;
                updateHUD();
                setTimeout(() => {
                    const needed = maxClip - clipAmmo;
                    const amountToLoad = Math.min(needed, reserveAmmo);
                    clipAmmo += amountToLoad;
                    reserveAmmo -= amountToLoad;
                    isReloading = false;
                    updateHUD();
                }, 1500);
            }
        });


        // --- 6. ENEMIES & AMMO LOGIC ---
        function startWave() {
            enemiesToSpawn = 3 + (currentWave * 2); // Scales up
            enemiesAlive = enemiesToSpawn;
            updateHUD();
            
            // Spawn ammo at start of round
            spawnAmmoDrop(); 
            
            // Stagger enemy spawns
            let spawned = 0;
            const spawnInterval = setInterval(() => {
                if(spawned >= enemiesToSpawn || isDead) {
                    clearInterval(spawnInterval);
                    return;
                }
                spawnEnemy();
                spawned++;
            }, 1000);
        }

        function spawnEnemy() {
            if(!baseEnemyModel) return;
            const enemy = baseEnemyModel.clone();
            
            // Random spawn position around player (distance 100-200)
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 100;
            enemy.position.set(
                camera.position.x + Math.cos(angle) * dist,
                playerHeight, 
                camera.position.z + Math.sin(angle) * dist
            );
            
            // Scale stats by wave
            enemy.userData = {
                hp: 50 + (currentWave * 20),
                speed: 1.5 + (currentWave * 0.3),
                damage: 10 + (currentWave * 2)
            };

            // Size variation based on health
            const scale = 1 + (currentWave * 0.05);
            enemy.scale.set(scale, scale, scale);

            enemiesGroup.add(enemy);
            enemies.push(enemy);
        }

        function killEnemy(enemyObj) {
            enemiesGroup.remove(enemyObj);
            const index = enemies.indexOf(enemyObj);
            if (index > -1) enemies.splice(index, 1);
            
            // Chance to drop ammo on death
            if(Math.random() < 0.3) spawnAmmoDrop(enemyObj.position);

            enemiesAlive--;
            if (enemiesAlive <= 0) {
                currentWave++;
                setTimeout(startWave, 2000); // Wait 2s then start next wave
            }
        }

        function spawnAmmoDrop(pos = null) {
            if(!baseAmmoModel) return;
            const ammo = baseAmmoModel.clone();
            
            if (pos) {
                ammo.position.copy(pos);
            } else {
                // Random map spawn
                ammo.position.set(
                    camera.position.x + (Math.random() * 200 - 100),
                    playerHeight, 
                    camera.position.z + (Math.random() * 200 - 100)
                );
            }
            
            scene.add(ammo);
            ammoDrops.push(ammo);
        }


        // --- 7. JOYSTICK & CAMERA MOVEMENT ---
        let moveData = { x: 0, z: 0 };
        const joystickL = nipplejs.create({
            zone: document.getElementById('joystick-left'),
            mode: 'static',
            position: { left: '60px', bottom: '60px' },
            color: 'white'
        });

        joystickL.on('move', (evt, data) => {
            const force = Math.min(data.force, 1);
            moveData.x = Math.cos(data.angle.radian) * force; 
            moveData.z = Math.sin(data.angle.radian) * force;
        });
        joystickL.on('end', () => { moveData = { x: 0, z: 0 }; });

        let touchId = null, prevTouch = { x: 0, y: 0 };
        const canvas = renderer.domElement;

        canvas.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].clientX > window.innerWidth / 2) {
                    touchId = e.changedTouches[i].identifier;
                    prevTouch = { x: e.changedTouches[i].clientX, y: e.changedTouches[i].clientY };
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchId) {
                    const deltaX = e.changedTouches[i].clientX - prevTouch.x;
                    const deltaY = e.changedTouches[i].clientY - prevTouch.y;
                    camera.rotation.y -= deltaX * 0.003; 
                    camera.rotation.x -= deltaY * 0.003;
                    camera.rotation.x = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, camera.rotation.x));
                    prevTouch = { x: e.changedTouches[i].clientX, y: e.changedTouches[i].clientY };
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchId) touchId = null;
            }
        });


        // --- 8. MAIN GAME LOOP ---
        const floorRaycaster = new THREE.Raycaster();
        const wallRaycaster = new THREE.Raycaster();
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            if (isDead) return;

            const deltaTime = clock.getDelta();
            const now = Date.now();

            // -- Player Health Regen Logic --
            if (hp < maxHp && now - lastHitTime > 5000) {
                hp += 15 * deltaTime; // Regen 15 HP per second
                if(hp > maxHp) hp = maxHp;
                updateHUD();
            }

            if (mapModel) {
                // -- Dash & Speed Lines UI Logic --
                let targetFov = 75; 
                let speedOpacity = 0;

                if (dashTimer > 0) {
                    dashTimer -= deltaTime;
                    currentSpeed = runSpeed * dashMultiplier;
                    targetFov = 100; // Warp FOV
                    speedOpacity = 1; // Max lines/blur
                    document.getElementById('speed-effect').style.backdropFilter = "blur(4px)";
                } else {
                    currentSpeed = runSpeed;
                    document.getElementById('speed-effect').style.backdropFilter = "blur(0px)";
                    // Show slight speed lines if normally running
                    if(moveData.x !== 0 || moveData.z !== 0) speedOpacity = 0.3; 
                }

                document.getElementById('speed-effect').style.opacity = speedOpacity;
                camera.fov += (targetFov - camera.fov) * 0.1;
                camera.updateProjectionMatrix();

                // Dash Cooldown
                if (dashCooldown > 0) {
                    dashCooldown -= deltaTime;
                    const btnDash = document.getElementById('btn-dash');
                    if (dashCooldown <= 0) {
                        btnDash.style.opacity = '1.0'; btnDash.innerText = "DASH";
                    } else {
                        btnDash.innerText = Math.ceil(dashCooldown) + "s";
                    }
                }

                // -- Horizontal Movement --
                const moveX = moveData.x * currentSpeed;
                const moveZ = moveData.z * currentSpeed;
                let isMoving = false;

                if (moveX !== 0 || moveZ !== 0) {
                    isMoving = true;
                    const moveVector = new THREE.Vector3(moveX, 0, -moveZ);
                    moveVector.applyQuaternion(camera.quate
