<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, landscape">
    <title>3D FPS Map Explorer</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #050505; /* Start dark */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100vw; height: 100vh;
        }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0, 255, 0, 0.7);
            font-size: 24px;
            font-family: sans-serif;
            pointer-events: none;
        }

        #joystick-left {
            position: absolute;
            bottom: 40px; left: 50px;
            width: 120px; height: 120px;
            pointer-events: auto;
        }

        .action-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }
        .action-btn:active { background: rgba(255, 255, 255, 0.6); }

        /* Button Positioning Stacked on the Right */
        #btn-jump {
            bottom: 40px; right: 50px;
            width: 70px; height: 70px;
            font-size: 14px;
        }

        #btn-run {
            bottom: 125px; right: 50px;
            width: 60px; height: 60px;
            font-size: 14px;
        }

        #btn-shoot {
            bottom: 200px; right: 50px;
            width: 65px; height: 65px;
            font-size: 12px;
            background: rgba(255, 100, 100, 0.3);
            border-color: rgba(255, 100, 100, 0.6);
        }
        #btn-shoot:active { background: rgba(255, 50, 50, 0.8); }

        #btn-flash {
            top: 30px; right: 50px;
            width: 50px; height: 50px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="loading">Loading Map & Assets...</div>
    
    <div id="ui-layer">
        <div id="crosshair">＋</div>
        <div id="joystick-left"></div>
        <button id="btn-shoot" class="action-btn">SHOOT</button>
        <button id="btn-run" class="action-btn">RUN</button>
        <button id="btn-jump" class="action-btn">JUMP</button>
        <button id="btn-flash" class="action-btn">🔦</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // 1. AUDIO SETUP (Must be initialized after first user interaction on mobile)
        const bgMusic = new Audio('music.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.15; // Low volume background music

        const shotSfx = new Audio('shot.mp3');
        shotSfx.volume = 0.8;

        const runSfx = new Audio('run.mp3');
        runSfx.loop = true;
        runSfx.volume = 0.5;

        let audioUnlocked = false;
        document.body.addEventListener('touchstart', () => {
            if (!audioUnlocked) {
                bgMusic.play().catch(e => console.log("Audio autoplay prevented", e));
                audioUnlocked = true;
            }
        }, { once: true });


        // 2. SCENE & CAMERA SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.005); // Thick dark fog
        scene.background = new THREE.Color(0x020202); // Pitch black background

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.rotation.order = 'YXZ';
        scene.add(camera); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);


        // 3. LIGHTING & FIXING THE FLASHLIGHT
        // Make the ambient light extremely low so the map is dark
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.05); 
        scene.add(ambientLight);

        // Flashlight configuration
        const flashlight = new THREE.SpotLight(0xffffff, 2.5, 300, Math.PI / 8, 0.6, 1);
        // Position slightly in front of camera to prevent clipping with player body/gun
        flashlight.position.set(0, 0, -1); 
        
        // CRITICAL FIX: The target must be parented to the camera and pushed forward
        // so it always looks exactly where the camera is looking.
        flashlight.target.position.set(0, 0, -20); 
        
        camera.add(flashlight);
        camera.add(flashlight.target);
        flashlight.visible = true; // Default to ON since map is dark

        document.getElementById('btn-flash').addEventListener('touchstart', (e) => {
            e.preventDefault();
            flashlight.visible = !flashlight.visible;
        });


        // 4. LOAD ASSETS (MAP & GUN)
        const loader = new THREE.GLTFLoader();
        let mapModel = null;
        let modelsLoaded = 0;

        function checkLoading() {
            modelsLoaded++;
            if (modelsLoaded === 2) {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Load Map
        loader.load('map.glb', (gltf) => {
            mapModel = gltf.scene;
            scene.add(mapModel);
            checkLoading();
        }, undefined, () => checkLoading()); // Fail safe

        // Load Sniper Rifle
        let gunModel = null;
        loader.load('gun.glb', (gltf) => {
            gunModel = gltf.scene;
            
            // FPS Positioning: Adjust these values if your gun is too big/small or facing backwards
            // (x: right, y: up/down, z: forward/back)
            gunModel.position.set(0.6, -0.4, -1.2); 
            
            // Depending on how the 3D artist exported the gun, you might need to rotate it.
            // Example: gunModel.rotation.y = Math.PI; (if it's facing you instead of away)
            
            camera.add(gunModel); // Attach to camera so it moves with view
            checkLoading();
        }, undefined, () => checkLoading()); // Fail safe


        // 5. PLAYER PHYSICS & ACTIONS
        const playerHeight = 40; 
        const playerRadius = 8;  
        
        const walkSpeed = 1.5;
        const runSpeed = 4.5;
        let isRunning = false;

        let yVelocity = 0;
        let isGrounded = false;
        const gravity = 0.25; 
        const jumpStrength = 5.0; 

        camera.position.set(0, playerHeight + 100, 0);

        // Actions
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isGrounded) {
                yVelocity = jumpStrength;
                isGrounded = false;
            }
        });

        const runBtn = document.getElementById('btn-run');
        runBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isRunning = !isRunning;
            runBtn.style.background = isRunning ? 'rgba(255, 255, 255, 0.6)' : 'rgba(255, 255, 255, 0.2)';
        });

        document.getElementById('btn-shoot').addEventListener('touchstart', (e) => {
            e.preventDefault();
            // Reset sound to 0 so you can spam shoot
            shotSfx.currentTime = 0;
            shotSfx.play().catch(e => console.log(e));

            // Optional: Simple visual recoil for the gun
            if(gunModel) {
                gunModel.position.z += 0.2; // kick back
                setTimeout(() => { gunModel.position.z -= 0.2; }, 100); // return
            }
        });


        // 6. JOYSTICK (Movement)
        let moveData = { x: 0, z: 0 };
        const joystickL = nipplejs.create({
            zone: document.getElementById('joystick-left'),
            mode: 'static',
            position: { left: '60px', bottom: '60px' },
            color: 'white'
        });

        joystickL.on('move', (evt, data) => {
            const angle = data.angle.radian;
            const force = Math.min(data.force, 1);
            moveData.x = Math.cos(angle) * force; 
            moveData.z = Math.sin(angle) * force;
        });
        joystickL.on('end', () => { moveData = { x: 0, z: 0 }; });


        // 7. SWIPE TO AIM 
        let touchId = null;
        let prevTouch = { x: 0, y: 0 };
        const canvas = renderer.domElement;

        canvas.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.clientX > window.innerWidth / 2) {
                    touchId = touch.identifier;
                    prevTouch = { x: touch.clientX, y: touch.clientY };
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === touchId) {
                    const deltaX = touch.clientX - prevTouch.x;
                    const deltaY = touch.clientY - prevTouch.y;

                    camera.rotation.y -= deltaX * 0.003; 
                    camera.rotation.x -= deltaY * 0.003;
                    
                    camera.rotation.x = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, camera.rotation.x));
                    
                    prevTouch = { x: touch.clientX, y: touch.clientY };
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchId) touchId = null;
            }
        });


        // 8. PHYSICS & ANIMATION LOOP
        const floorRaycaster = new THREE.Raycaster();
        const wallRaycaster = new THREE.Raycaster();
        const downVector = new THREE.Vector3(0, -1, 0);

        function animate() {
            requestAnimationFrame(animate);

            if (mapModel) {
                const currentSpeed = isRunning ? runSpeed : walkSpeed;
                const moveX = moveData.x * currentSpeed;
                const moveZ = moveData.z * currentSpeed;
                let isMoving = false;

                // --- A. HORIZONTAL MOVEMENT & WALL COLLISIONS ---
                if (moveX !== 0 || moveZ !== 0) {
                    isMoving = true;
                    const moveVector = new THREE.Vector3(moveX, 0, -moveZ);
                    moveVector.applyQuaternion(camera.quaternion); 
                    moveVector.y = 0; 
                    moveVector.normalize();

                    wallRaycaster.set(camera.position, moveVector);
                    const wallHits = wallRaycaster.intersectObject(mapModel, true);

                    if (wallHits.length === 0 || wallHits[0].distance > playerRadius) {
                        camera.translateX(moveX);
                        camera.translateZ(-moveZ);
                    }
                }
                
                // --- B. RUNNING SFX LOGIC ---
                if (isMoving && isRunning && isGrounded && audioUnlocked) {
                    if (runSfx.paused) runSfx.play().catch(()=>console.log("SFX Blocked"));
                } else {
                    if (!runSfx.paused) runSfx.pause();
                }

                // --- C. GRAVITY, JUMPING, & FLOOR COLLISIONS ---
                yVelocity -= gravity; 
                camera.position.y += yVelocity;

                floorRaycaster.set(camera.position, downVector);
                const floorHits = floorRaycaster.intersectObject(mapModel, true);

                if (floorHits.length > 0) {
                    const distToFloor = floorHits[0].distance;

                    if (distToFloor <= playerHeight && yVelocity <= 0) {
                        camera.position.y += (playerHeight - distToFloor); 
                        yVelocity = 0;
                        isGrounded = true;
                    } 
                    else if (distToFloor < playerHeight && isGrounded) {
                        camera.position.y += (playerHeight - distToFloor);
                    }
                    else {
                        isGrounded = false;
                    }
                } else {
                    isGrounded = false; 
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // 9. WINDOW RESIZE HANDLING
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
