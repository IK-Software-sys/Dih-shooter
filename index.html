<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Map Explorer - Gravity & Swipe</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrolling */
            background-color: #87CEEB; /* Sky blue background */
            touch-action: none; /* Prevents mobile pull-to-refresh */
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* Single Left Joystick */
        #joystick-left {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            z-index: 10;
        }
        
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: white;
            z-index: 20;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="loading">Loading Map...</div>
    <div id="joystick-left"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Sharper graphics on mobile
        document.body.appendChild(renderer.domElement);

        // 2. LIGHTING
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // 3. LOAD THE MAP & PREPARE PHYSICS
        let mapModel = null;
        const loader = new THREE.GLTFLoader();
        
        loader.load('map.glb', function (gltf) {
            mapModel = gltf.scene;
            scene.add(mapModel);
            document.getElementById('loading').style.display = 'none';
        }, undefined, function (error) {
            console.error('Error loading model:', error);
            document.getElementById('loading').innerText = "Error loading map. Check console.";
        });

        // 4. PLAYER SETTINGS (Adjust these based on your map's scale)
        const playerHeight = 15; // How tall the player is above the floor
        const walkSpeed = 1.5;   // Speed of the joystick movement
        const fallSpeed = 2.0;   // How fast gravity pulls you down
        camera.position.set(0, playerHeight + 50, 0); // Drop in from above

        // 5. MOVEMENT & JOYSTICK SETUP
        let moveData = { forward: 0, right: 0 };
        const joystickL = nipplejs.create({
            zone: document.getElementById('joystick-left'),
            mode: 'static',
            position: { left: '80px', bottom: '80px' },
            color: 'white'
        });

        joystickL.on('move', (evt, data) => {
            const angle = data.angle.radian;
            const force = data.force > 1 ? 1 : data.force;
            moveData.right = Math.cos(angle) * force * walkSpeed; 
            moveData.forward = Math.sin(angle) * force * walkSpeed;
        });
        joystickL.on('end', () => { moveData = { forward: 0, right: 0 }; });

        // 6. SWIPE TO AIM SETUP
        let isDragging = false;
        let previousTouch = { x: 0, y: 0 };

        // We attach touch events to the canvas so it doesn't interfere with the joystick
        const canvas = renderer.domElement;
        
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousTouch.x = e.touches[0].clientX;
            previousTouch.y = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const currentTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                const deltaX = currentTouch.x - previousTouch.x;
                const deltaY = currentTouch.y - previousTouch.y;

                // Adjust sensitivity here (0.005)
                camera.rotation.y -= deltaX * 0.005;
                camera.rotation.x -= deltaY * 0.005;
                
                // Clamp looking up and down so you don't break your neck
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));

                previousTouch = currentTouch;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => { isDragging = false; });

        // 7. GRAVITY & ANIMATION LOOP
        const raycaster = new THREE.Raycaster();
        const downVector = new THREE.Vector3(0, -1, 0);

        function animate() {
            requestAnimationFrame(animate);

            // Handle horizontal movement
            camera.translateX(moveData.right);
            camera.translateZ(-moveData.forward);
            camera.rotation.z = 0; // Prevent camera roll

            // Handle Gravity & Floor Collisions
            if (mapModel) {
                // Shoot a laser straight down from the camera
                raycaster.set(camera.position, downVector);
                // Check what the laser hits on the map
                const intersects = raycaster.intersectObject(mapModel, true);

                if (intersects.length > 0) {
                    const distanceToFloor = intersects[0].distance;

                    if (distanceToFloor < playerHeight) {
                        // We are too low (walking up a hill or stairs), push up
                        camera.position.y += (playerHeight - distanceToFloor);
                    } else if (distanceToFloor > playerHeight + 0.5) {
                        // We are too high (falling)
                        camera.position.y -= fallSpeed;
                    }
                } else {
                    // If the laser hits nothing (we walked off the edge of the map), keep falling
                    camera.position.y -= fallSpeed;
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // 8. HANDLE WINDOW RESIZING
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
