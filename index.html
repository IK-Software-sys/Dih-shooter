<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, landscape">
    <title>3D FPS - Pro Movement</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #87CEEB;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100vw; height: 100vh;
        }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Screen effect for dashing */
        #speed-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(255, 255, 255, 0.4) 100%);
            opacity: 0;
            transition: opacity 0.1s ease-out;
            pointer-events: none;
            z-index: 5;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0, 255, 0, 0.7);
            font-size: 24px;
            font-family: sans-serif;
            pointer-events: none;
        }

        #joystick-left {
            position: absolute;
            bottom: 40px; left: 50px;
            width: 120px; height: 120px;
            pointer-events: auto;
        }

        .action-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            transition: background 0.2s, opacity 0.2s;
        }
        .action-btn:active { background: rgba(255, 255, 255, 0.6); }

        #btn-jump {
            bottom: 40px; right: 50px;
            width: 70px; height: 70px;
            font-size: 14px;
        }

        #btn-dash {
            bottom: 125px; right: 50px;
            width: 60px; height: 60px;
            font-size: 12px;
            background: rgba(100, 200, 255, 0.3);
        }

        #btn-shoot {
            bottom: 200px; right: 50px;
            width: 65px; height: 65px;
            font-size: 12px;
            background: rgba(255, 100, 100, 0.3);
            border-color: rgba(255, 100, 100, 0.6);
        }
        #btn-shoot:active { background: rgba(255, 50, 50, 0.8); }

    </style>
</head>
<body>

    <div id="loading">Loading Map & Assets...</div>
    <div id="speed-effect"></div>
    
    <div id="ui-layer">
        <div id="crosshair">＋</div>
        <div id="joystick-left"></div>
        <button id="btn-shoot" class="action-btn">SHOOT</button>
        <button id="btn-dash" class="action-btn">DASH</button>
        <button id="btn-jump" class="action-btn">JUMP</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // 1. AUDIO SETUP
        const bgMusic = new Audio('music.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.15;

        // Better Shoot SFX logic (Clones node for overlap & instant sync)
        const shotSfxSrc = 'shot.mp3';
        function playShootSound() {
            const sound = new Audio(shotSfxSrc);
            sound.volume = 0.8;
            sound.play().catch(e => console.log(e));
        }

        const runSfx = new Audio('run.mp3');
        runSfx.loop = true;
        runSfx.volume = 0.5;

        let audioUnlocked = false;
        document.body.addEventListener('touchstart', () => {
            if (!audioUnlocked) {
                bgMusic.play().catch(e => console.log("Audio autoplay prevented", e));
                audioUnlocked = true;
            }
        }, { once: true });


        // 2. SCENE & CAMERA SETUP (Restored normal lighting)
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.001); 
        scene.background = new THREE.Color(0x87CEEB); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.rotation.order = 'YXZ';
        scene.add(camera); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); 
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.4);
        sunLight.position.set(50, 100, 50);
        scene.add(sunLight);


        // 3. LOAD ASSETS (MAP & GUN)
        const loader = new THREE.GLTFLoader();
        let mapModel = null;
        let modelsLoaded = 0;

        function checkLoading() {
            modelsLoaded++;
            if (modelsLoaded === 2) {
                document.getElementById('loading').style.display = 'none';
            }
        }

        loader.load('map.glb', (gltf) => {
            mapModel = gltf.scene;
            scene.add(mapModel);
            checkLoading();
        }, undefined, () => checkLoading());

        let gunModel = null;
        loader.load('gun.glb', (gltf) => {
            gunModel = gltf.scene;
            gunModel.position.set(0.6, -0.4, -1.2); 
            camera.add(gunModel); 
            checkLoading();
        }, undefined, () => checkLoading()); 


        // 4. ADVANCED PLAYER PHYSICS
        const playerHeight = 40; 
        const playerRadius = 8;  
        
        const runSpeed = 4.5; // Always running now
        const dashMultiplier = 3.5;
        let currentSpeed = runSpeed;
        
        // Movement States
        let yVelocity = 0;
        let isGrounded = false;
        let jumps = 0; // Double jump counter
        const gravity = 0.25; 
        const jumpStrength = 5.5; 

        // Dash States
        let dashTimer = 0;
        let dashCooldown = 0;

        camera.position.set(0, playerHeight + 100, 0);

        // Actions
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
            e.preventDefault();
            // Allow double jump
            if (isGrounded || jumps < 2) {
                yVelocity = jumpStrength;
                jumps++;
                isGrounded = false;
            }
        });

        document.getElementById('btn-dash').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (dashCooldown <= 0) {
                dashTimer = 0.2; // 0.2 seconds dash duration
                dashCooldown = 3.0; // 3 second cooldown
                document.getElementById('btn-dash').style.opacity = '0.5';
                document.getElementById('speed-effect').style.opacity = '1';
            }
        });

        document.getElementById('btn-shoot').addEventListener('touchstart', (e) => {
            e.preventDefault();
            playShootSound(); // Fixed sync!

            // Recoil
            if(gunModel) {
                gunModel.position.z += 0.2; 
                setTimeout(() => { gunModel.position.z -= 0.2; }, 100); 
            }
        });


        // 5. JOYSTICK (Movement)
        let moveData = { x: 0, z: 0 };
        const joystickL = nipplejs.create({
            zone: document.getElementById('joystick-left'),
            mode: 'static',
            position: { left: '60px', bottom: '60px' },
            color: 'white'
        });

        joystickL.on('move', (evt, data) => {
            const angle = data.angle.radian;
            const force = Math.min(data.force, 1);
            moveData.x = Math.cos(angle) * force; 
            moveData.z = Math.sin(angle) * force;
        });
        joystickL.on('end', () => { moveData = { x: 0, z: 0 }; });


        // 6. SWIPE TO AIM 
        let touchId = null;
        let prevTouch = { x: 0, y: 0 };
        const canvas = renderer.domElement;

        canvas.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.clientX > window.innerWidth / 2) {
                    touchId = touch.identifier;
                    prevTouch = { x: touch.clientX, y: touch.clientY };
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === touchId) {
                    const deltaX = touch.clientX - prevTouch.x;
                    const deltaY = touch.clientY - prevTouch.y;

                    camera.rotation.y -= deltaX * 0.003; 
                    camera.rotation.x -= deltaY * 0.003;
                    camera.rotation.x = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, camera.rotation.x));
                    
                    prevTouch = { x: touch.clientX, y: touch.clientY };
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchId) touchId = null;
            }
        });


        // 7. PHYSICS & ANIMATION LOOP
        const floorRaycaster = new THREE.Raycaster();
        const wallRaycaster = new THREE.Raycaster();
        const downVector = new THREE.Vector3(0, -1, 0);
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();

            if (mapModel) {
                // Dash Timer & Cooldown Logic
                let targetFov = 75; // Default Field of View

                if (dashTimer > 0) {
                    dashTimer -= deltaTime;
                    currentSpeed = runSpeed * dashMultiplier;
                    targetFov = 95; // Warp speed camera effect
                } else {
                    currentSpeed = runSpeed;
                    document.getElementById('speed-effect').style.opacity = '0';
                }

                // Smoothly Lerp Camera FOV
                camera.fov += (targetFov - camera.fov) * 0.1;
                camera.updateProjectionMatrix();

                // Dash Cooldown UI
                if (dashCooldown > 0) {
                    dashCooldown -= deltaTime;
                    const btnDash = document.getElementById('btn-dash');
                    if (dashCooldown <= 0) {
                        btnDash.style.opacity = '1.0';
                        btnDash.innerText = "DASH";
                    } else {
                        btnDash.innerText = Math.ceil(dashCooldown) + "s";
                    }
                }

                // --- A. HORIZONTAL MOVEMENT & WALL RUN ---
                const moveX = moveData.x * currentSpeed;
                const moveZ = moveData.z * currentSpeed;
                let isMoving = false;

                if (moveX !== 0 || moveZ !== 0) {
                    isMoving = true;
                    const moveVector = new THREE.Vector3(moveX, 0, -moveZ);
                    moveVector.applyQuaternion(camera.quaternion); 
                    moveVector.y = 0; 
                    moveVector.normalize();

                    wallRaycaster.set(camera.position, moveVector);
                    const wallHits = wallRaycaster.intersectObject(mapModel, true);

                    if (wallHits.length === 0 || wallHits[0].distance > playerRadius) {
                        camera.translateX(moveX);
                        camera.translateZ(-moveZ);
                    } else {
                        // WALL RUN (Slide) LOGIC
                        if (!isGrounded && yVelocity < 0) {
                            yVelocity = -0.05; // Slow down fall dramatically
                            jumps = 0; // Reset jumps so you can jump off the wall!
                        }
                    }
                }
                
                // --- B. AUDIO SYNC: Constantly Running SFX ---
                if (isMoving && isGrounded && audioUnlocked) {
                    if (runSfx.paused) runSfx.play().catch(()=>{});
                } else {
                    if (!runSfx.paused) runSfx.pause();
                }

                // --- C. GRAVITY & FLOOR COLLISIONS ---
                yVelocity -= gravity; 
                camera.position.y += yVelocity;

                floorRaycaster.set(camera.position, downVector);
                const floorHits = floorRaycaster.intersectObject(mapModel, true);

                if (floorHits.length > 0) {
                    const distToFloor = floorHits[0].distance;

                    if (distToFloor <= playerHeight && yVelocity <= 0) {
                        camera.position.y += (playerHeight - distToFloor); 
                        yVelocity = 0;
                        isGrounded = true;
                        jumps = 0; // Reset jumps on floor
                    } 
                    else if (distToFloor < playerHeight && isGrounded) {
                        camera.position.y += (playerHeight - distToFloor);
                    }
                    else {
                        isGrounded = false;
                    }
                } else {
                    isGrounded = false; 
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // 8. WINDOW RESIZE HANDLING
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
